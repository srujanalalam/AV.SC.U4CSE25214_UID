<!DOCTYPE html>
<html>
  <body>
    <script>
      let s1=parseInt(prompt("enter s1 marks:"));
      let s2=parseInt(prompt("enter s2 marks:"));
      let s3=parseInt(prompt("enter s3 marks:"));
      let s4=parseInt(prompt("enter s4 marks:"));
      let s5=parseInt(prompt("enter s5 marks:"));
      let s6=parseInt(prompt("enter s6 marks:"));
      let avg=(s1+s2+s3+s4+s5+s6)/6;
      if (avg<60){
        document.write("GRADE F");
      }
      else if (avg<70){
        document.write("GRADE D");
      }
      else if (avg<80){
        document.write("GRADE C");
      }
      else if (avg<90){
        document.write("GRADE B");
      }
      else{
        document.write("GRADE A");
      }
    
    </script>
  </body>
</html>
