<!DOCTYPE html>
<html>
<head>
<style>

body{
    font-family:Arial;
    text-align:center;
}

.products{

    grid-template-columns:repeat(2,1fr);
    gap:20px;
    padding:20px;
}

.card{
    border:3px solid #b44;
    padding:15px;
}

img{
    width:120px;
    height:120px;
}

button{
    background:purple;
    color:white;
    border:none;
    padding:6px 12px;
}

</style>
</head>

<body>

<h2>Thriller Books</h2>

<div class="products">

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRcZV-1c20qGMnlUt8DQd8AF7R0HaMlP7uGGQ&s">
<h3>The Silent Patient</h3>
<p>Price: Rs 820/-</p>
<button>Add To Cart</button>
</div>

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQWFqG_IBShBFe6n6HEv58MfAbFF69-u8XDEw&s">
<h3>The Hunger</h3>
<p>Price: Rs 595/-</p>
<button>Add To Cart</button>
</div>

<div class="card">
<img src="https://cdn.shopify.com/s/files/1/0648/3066/9017/files/The_Housemaid-Prh_Select_360x.jpg?v=1745709350">
<h3>The HouseMaid</h3>
<p>Price: Rs 430/-</p>
<button>Add To Cart</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51tGqXpODSL._AC_SR290,290_.jpg">

<p>Price: Rs 615/-</p>
<button>Add To Cart</button>
</div>

</div>

</body>
</html>
