.card{

}

img{
    width:120px;
    height:120px;
}

button{

    color:white;
    border:none;
    padding:6px 12px;
}

</style>
</head>

<body>

<h2>Horror Books</h2>

<div class="products">

</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/715qjNTdYML._UF1000,1000_QL80_.jpg">

</div>

<div class="card">

</div>

<div class="card">

</div>

</html>
